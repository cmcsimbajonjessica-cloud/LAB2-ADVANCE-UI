<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Haircut Booking</title>
  <meta name="description" content="Book your haircut, shave, or hair color appointment online easily with Haircut Booking.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Optional skip link -->
<a href="#main-content" class="skip-link">Skip to main content</a>

<div class="container">

  <header>
    <h1>Haircut Booking</h1>
  </header>

  <nav>
    <a href="#">Home</a><br>
    <a href="#">Services</a><br>
    <a href="#">Contact</a>
  </nav>

  <main id="main-content">
    <h2>Book an Appointment</h2>

    <form>

      <label for="name">Name:</label><br>
      <input type="text" id="name" name="name" required><br><br>

      <label for="date">Date:</label><br>
      <input type="date" id="date" name="date" required><br><br>

      <label for="service">Service:</label><br>
      <select id="service" name="service">
        <option>Haircut</option>
        <option>Shave</option>
        <option>Hair Color</option>
      </select><br><br>

      <button type="submit">Book Now</button>

    </form>
  </main>

  <aside>
    <h3>Promo</h3>
    <p>20% off for new customers!</p>
  </aside>

  <footer>
    <p>© 2026 Haircut Booking</p>
  </footer>

</div>

</body>
</html>
